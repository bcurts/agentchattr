[server]
host = "127.0.0.1"
port = 8300
data_dir = "./data"

# Add agents here. Each gets a status pill, @mention routing, and color.
# "cwd" is the working directory for the agent's terminal session.
# "command" is the CLI command (must be on PATH).

[agents.claude]
command = "claude"
cwd = ".."
color = "#da7756"
label = "Claude"
[agents.codex]
command = "codex"
cwd = "K:/GitHub/JMD-MyrientDownloader"
color = "#10a37f"
label = "Codex"
resume_flag = "exec resume"
extra_args = ["--sandbox", "workspace-write", "-a", "never", "-c", "windows.sandbox=unelevated"]
write_access = true

[agents.gemini]
command = "gemini"
cwd = "K:/GitHub/JMD-MyrientDownloader"
color = "#4285f4"
label = "Gemini"
resume_flag = "--resume"
write_access = true

[routing]
default = "none"
max_agent_hops = 4

[mcp]
http_port = 8200
sse_port = 8201

[images]
upload_dir = "./uploads"
max_size_mb = 10

# --- API agents (local models) ---
# Add local model agents in config.local.toml (gitignored).
# Example config.local.toml:
#
#   [agents.qwen]
#   type = "api"
#   base_url = "http://localhost:8189/v1"
#   model = "qwen3-4b"
#   color = "#8b5cf6"
#   label = "Qwen"
#   # api_key_env = "MY_API_KEY"     # optional: env var name for API key
#   # system_prompt = "You are ..."   # optional: custom system prompt
#
# Then run: python wrapper_api.py qwen
